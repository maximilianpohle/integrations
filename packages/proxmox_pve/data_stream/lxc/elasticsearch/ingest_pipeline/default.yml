---
description: Pipeline for processing Proxmox VE LXC container metrics
processors:
  - set:
      field: ecs.version
      value: 8.0.0
  - set:
      field: event.module
      value: proxmox_pve
  - set:
      field: event.dataset
      value: proxmox_pve.lxc
  - set:
      field: service.type
      value: proxmox_pve
  - rename:
      field: message
      target_field: event.original
      ignore_missing: true
