title: "Proxmox VE Virtual Machine Metrics"
type: metrics
streams:
  - input: httpjson
    title: Proxmox VE Virtual Machine Metrics
    description: Collect CPU, memory, and disk metrics for VMs
    template_path: httpjson.yml.hbs
    vars:
      - name: period
        type: text
        title: Collection Interval
        description: The period for fetching metrics (e.g., 30s, 1m, 5m)
        default: 30s
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - proxmox_pve
          - virtualmachine
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the events are shipped. See [Processors](https://www.elastic.co/guide/en/fleet/current/elastic-agent-processor-configuration.html) for details.
elasticsearch:
  index_mode: "time_series"
